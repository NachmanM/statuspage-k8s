name: build test and push docker image to ecr

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: build image
      run: docker build -f ./Application/Dockerfile ./Application --tag statuspage:latest
    - name: run container
      run: docker run -d --name test-container -p 8080:8080 statuspage:latest
    - name: Test container
      run: | # sleep to let the container start
        sleep 10
        docker ps= -a
        docker logs test-container
        curl --fail --retry 5 --retry-delay 3 --retry-connrefused http://localhost:8080 || exit 1

    - name: Stop container
      run: docker stop test-container

  ecr:
    needs: build # only when build pass if build doesnt pass ecr job gets skipped
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build and push to ECR
      run: |
        docker build -f ./Application/Dockerfile ./Application --tag ${{ steps.login-ecr.outputs.registry }}/nach-hi/statuspage:${{ github.sha }}
        docker push ${{ steps.login-ecr.outputs.registry }}/nach-hi/statuspage:${{ github.sha }}