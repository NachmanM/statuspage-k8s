apiVersion: networking.k8s.io/v1
kind: Ingress 
metadata: 
  name: ingress-rule-argocd
  namespace: argocd
spec:
  ingressClassName: ingress-class
  rules:
  - http:
      paths:
      - path: /argocd
        pathType: Prefix
        backend:
          service:
            name: argocd-server
            port:
              number: 80
